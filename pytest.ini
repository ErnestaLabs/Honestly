[pytest]
# Collect ONLY test_*.py. The default also matches *_test.py, which would sweep in
# gitignored scratch files like _stress_test.py (a 5-hour live Hit-MCP Reddit scan) and
# _pay_test.py. Restricting the glob keeps the offline suite offline, fast and deterministic.
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -p no:cacheprovider
